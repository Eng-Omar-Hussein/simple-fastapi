apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-protocol-api
  labels:
    app: task-protocol
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-protocol
  template:
    metadata:
      labels:
        app: task-protocol
    spec:
      containers:
      - name: api
        image: omarhussein2111/simple-fastapi-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: task-protocol-service
spec:
  type: NodePort
  selector:
    app: task-protocol
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30007
