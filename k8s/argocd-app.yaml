apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-protocol-argo
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: 'https://github.com/Eng-Omar-Hussein/simple-fastapi.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: task-protocol-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
